<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course | Personal Course Organizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Add New Course</h1>
        <p>Register a new subject to your schedule</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html" class="active">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section class="card">
            <form action="#">
                <div class="input-group">
                    <label for="courseName">Course Name:</label>
                    <input type="text" id="courseName" name="courseName" placeholder="e.g., Data Structures" required>
                </div>
                
                <div class="input-group">
                    <label for="instructorName">Instructor:</label>
                    <input type="text" id="instructorName" name="instructorName" placeholder="e.g., Dr. Ali" required>
                </div>
                
                <div class="input-group">
                    <label for="creditHours">Credit Hours:</label>
                    <input type="number" id="creditHours" name="creditHours" min="1" max="5" required>
                </div>
                
                <div class="input-group">
                    <label for="courseNotes">Notes:</label>
                    <textarea id="courseNotes" name="courseNotes" rows="4" placeholder="Enter important details..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Save Course Data</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - OMAR TAWFIK ABD ELFATTAH TAWFIK 20250665</p>
    </footer>

</body>
</html>
