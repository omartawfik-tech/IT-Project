<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Personal Course Organizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Contact Us</h1>
        <p>Get in touch for technical support</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html" class="active">Contact Us</a>
    </nav>

    <main>
        <section class="card">
            <form action="#">
                <div class="input-group">
                    <label for="userEmail">Email Address:</label>
                    <input type="email" id="userEmail" name="userEmail" placeholder="your.email@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="userMessage">Message:</label>
                    <textarea id="userMessage" name="userMessage" rows="5" placeholder="How can we help you?" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - OMAR TAWFIK ABD ELFATTAH TAWFIK 20250665</p>
    </footer>

</body>
</html>
